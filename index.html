<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Divine Comedy AR</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-three.prod.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #start {
      position:fixed; inset:0; z-index:99;
      background:#0d0902;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:20px; padding:30px; text-align:center;
      font-family:Georgia,serif; color:#f2e8d5;
    }
    h1 { font-size:2rem; color:#d4a017; }
    p  { font-size:0.85rem; color:#c8b890; line-height:1.8; font-style:italic; max-width:280px; }
    button {
      background:#d4a017; color:#000; border:none;
      padding:16px 36px; font-size:1rem;
      font-family:Georgia,serif; cursor:pointer;
      letter-spacing:0.1em; border-radius:3px;
      width:260px;
    }

    #scene-container {
      position:fixed; inset:0; display:none;
    }

    #msg {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      z-index:50; background:rgba(0,0,0,0.6);
      color:#d4a017; font-family:Georgia,serif;
      font-size:0.75rem; letter-spacing:0.2em;
      padding:8px 20px; pointer-events:none;
      white-space:nowrap;
    }
  </style>
</head>
<body>

<div id="start">
  <h1>Divine Comedy AR</h1>
  <p>Point your camera at the printed marker — a figure from Dante's journey will appear.</p>
  <button onclick="launch()">Open Camera</button>
</div>

<div id="scene-container"></div>
<div id="msg" style="display:none">⬡ Point at the marker ⬡</div>

<script>
async function launch() {

  // Request camera first (must come from user tap)
  try {
    const st = await navigator.mediaDevices.getUserMedia({ video:true });
    st.getTracks().forEach(t => t.stop());
  } catch(e) {
    alert('Camera denied. Please allow camera access in your browser settings, then reload.');
    return;
  }

  document.getElementById('start').style.display = 'none';
  document.getElementById('scene-container').style.display = 'block';
  document.getElementById('msg').style.display = 'block';

  const THREE = window.MINDAR.IMAGE.THREE;

  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.getElementById('scene-container'),
    imageTargetSrc: 'targets.mind',
    uiLoading: 'yes',
    uiScanning: 'yes',
    uiError: 'yes',
  });

  const { renderer, scene, camera } = mindarThree;

  // ── Lighting ──
  scene.add(new THREE.AmbientLight(0xfff0d0, 0.7));
  const sun = new THREE.DirectionalLight(0xffe8b0, 1.4);
  sun.position.set(2, 4, 3); scene.add(sun);
  const fill = new THREE.DirectionalLight(0x8090c0, 0.4);
  fill.position.set(-2, 1, 2); scene.add(fill);
  const gold = new THREE.PointLight(0xd4a017, 0.8, 3);
  gold.position.set(0, 0.5, 0.8); scene.add(gold);

  // ── Materials ──
  const skin   = new THREE.MeshPhongMaterial({ color:0xc8a882 });
  const robe   = new THREE.MeshPhongMaterial({ color:0x2e2248 });
  const cloak  = new THREE.MeshPhongMaterial({ color:0x7a0f0f });
  const dark   = new THREE.MeshPhongMaterial({ color:0x18100a });
  const leaf   = new THREE.MeshPhongMaterial({ color:0x3a5820 });

  // ── Helper builders ──
  function C(rt, rb, h, mat, s=8) {
    const g = new THREE.Group();
    const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s), mat);
    g.add(m);
    return g;
  }
  function S(r, mat) { return new THREE.Mesh(new THREE.SphereGeometry(r,10,8), mat); }
  function B(w,h,d, mat) { return new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat); }

  // ── Figure root ──
  const fig = new THREE.Group();
  fig.scale.setScalar(0.65);
  fig.position.y = 0.05;

  // Robe (long, wide at base)
  const robeMain = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.24,0.75,10), robe);
  robeMain.position.y = -0.04;
  const robeHem = new THREE.Mesh(new THREE.CylinderGeometry(0.24,0.28,0.08,10), dark);
  robeHem.position.y = -0.40;

  // Cloak draped over back/shoulders
  const cloakMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.22,0.60,9), cloak);
  cloakMesh.position.set(0, -0.02, -0.02);

  // Torso
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.10,0.12,0.26,9), robe);
  torso.position.y = 0.20;

  // Sash
  const sash = B(0.035, 0.26, 0.055, cloak);
  sash.position.set(-0.035, 0.20, 0.095); sash.rotation.z = 0.12;

  // ── Arms ──
  // Left — bent forward slightly
  const lSh = new THREE.Group(); lSh.position.set(-0.12, 0.26, 0); lSh.rotation.z = 0.35; lSh.rotation.x = 0.25;
  const lUA = new THREE.Mesh(new THREE.CylinderGeometry(0.042,0.048,0.22,7), robe); lUA.position.y=-0.11; lSh.add(lUA);
  const lEl = new THREE.Group(); lEl.position.y=-0.23; lEl.rotation.x=-0.55;
  const lFA = new THREE.Mesh(new THREE.CylinderGeometry(0.034,0.040,0.20,7), robe); lFA.position.y=-0.10;
  const lHd = S(0.044, skin); lHd.position.y=-0.21; lHd.scale.set(1,0.82,0.72);
  lEl.add(lFA, lHd); lSh.add(lEl);

  // Right — slightly raised, gesture of wonder
  const rSh = new THREE.Group(); rSh.position.set(0.12, 0.26, 0); rSh.rotation.z=-0.22; rSh.rotation.x=-0.20;
  const rUA = new THREE.Mesh(new THREE.CylinderGeometry(0.042,0.048,0.22,7), robe); rUA.position.y=-0.11; rSh.add(rUA);
  const rEl = new THREE.Group(); rEl.position.y=-0.23; rEl.rotation.x=0.35;
  const rFA = new THREE.Mesh(new THREE.CylinderGeometry(0.034,0.040,0.20,7), robe); rFA.position.y=-0.10;
  const rHd = S(0.044, skin); rHd.position.y=-0.21; rHd.scale.set(1,0.82,0.72);
  rEl.add(rFA, rHd); rSh.add(rEl);

  // ── Head group ──
  const headG = new THREE.Group(); headG.position.y = 0.50;

  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.038,0.046,0.10,8), skin); neck.position.y=-0.07;

  const headM = S(0.105, skin); headM.scale.set(0.93,1.0,0.91);

  // Aquiline nose
  const nose = new THREE.Mesh(new THREE.CylinderGeometry(0.010,0.020,0.055,6), skin);
  nose.position.set(0,-0.008,0.096); nose.rotation.x=-0.44;

  // Brow
  const brow = B(0.13,0.018,0.022, skin);
  brow.position.set(0,0.042,0.088); brow.rotation.x=-0.18;

  // Eyes
  const ewL = S(0.019, new THREE.MeshPhongMaterial({color:0xf0e8d8})); ewL.position.set(-0.037,0.020,0.084);
  const ewR = S(0.019, new THREE.MeshPhongMaterial({color:0xf0e8d8})); ewR.position.set( 0.037,0.020,0.084);
  const eyL = S(0.015, new THREE.MeshPhongMaterial({color:0x120c06})); eyL.position.set(-0.037,0.020,0.090);
  const eyR = S(0.015, new THREE.MeshPhongMaterial({color:0x120c06})); eyR.position.set( 0.037,0.020,0.090);

  // Mouth
  const mouth = B(0.052,0.011,0.016, new THREE.MeshPhongMaterial({color:0x7a4a3a}));
  mouth.position.set(0,-0.040,0.093);

  // Hair
  const hairCap = S(0.110, dark); hairCap.position.y=0.018; hairCap.scale.set(0.94,0.74,0.92);

  // ── Laurel wreath ──
  const wreath = new THREE.Group(); wreath.position.y=0.070;
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.094,0.007,6,24), leaf);
  ring.rotation.x = Math.PI/2; wreath.add(ring);
  for (let i=0; i<20; i++) {
    const a = (i/20)*Math.PI*2;
    const lf = new THREE.Mesh(new THREE.SphereGeometry(0.018,5,4), leaf);
    lf.position.set(Math.cos(a)*0.096, Math.sin(a*2)*0.010, Math.sin(a)*0.088);
    lf.scale.set(0.5,1.5,0.4); lf.rotation.y=a;
    wreath.add(lf);
  }

  headG.add(neck, hairCap, headM, brow, nose, ewL, ewR, eyL, eyR, mouth, wreath);

  // ── Halo ──
  const haloM = new THREE.MeshBasicMaterial({color:0xf0c030, side:THREE.DoubleSide, transparent:true, opacity:0.28});
  const halo = new THREE.Mesh(new THREE.RingGeometry(0.112,0.145,32), haloM);
  halo.position.y = 0.58; halo.rotation.x = -0.20;

  // ── Ground aura ──
  const auraM = new THREE.MeshBasicMaterial({color:0xd4a017, side:THREE.DoubleSide, transparent:true, opacity:0.18});
  const aura = new THREE.Mesh(new THREE.RingGeometry(0.20,0.38,36), auraM);
  aura.rotation.x = -Math.PI/2; aura.position.y = -0.46;

  fig.add(aura, halo, robeHem, cloakMesh, robeMain, torso, sash, lSh, rSh, headG);

  // ── Anchor ──
  const anchor = mindarThree.addAnchor(0);
  anchor.group.add(fig);

  anchor.onTargetFound = () => {
    document.getElementById('msg').textContent = '◈ The Wanderer — Divine Comedy AR ◈';
  };
  anchor.onTargetLost = () => {
    document.getElementById('msg').textContent = '⬡ Point at the marker ⬡';
  };

  // ── Animation ──
  const clock = new THREE.Clock();
  renderer.setAnimationLoop(() => {
    const T = clock.getElapsedTime();
    const w = 1.1; // slow, grave pace

    // Body gentle sway
    fig.rotation.y   = Math.sin(T * 0.3) * 0.05;
    robeMain.rotation.y = Math.sin(T * w * 0.5) * 0.04;
    torso.rotation.z    = Math.sin(T * w) * 0.022;

    // Arms swing opposite (walking)
    lSh.rotation.x  = 0.25 + Math.sin(T * w) * 0.20;
    rSh.rotation.x  = -0.20 - Math.sin(T * w) * 0.20;
    lEl.rotation.x  = -0.55 + Math.sin(T * w + 0.5) * 0.12;
    rEl.rotation.x  =  0.35 - Math.sin(T * w + 0.5) * 0.10;

    // Head — slow look around, slight nod
    headG.rotation.y = Math.sin(T * 0.38) * 0.12;
    headG.rotation.x = 0.04 + Math.sin(T * 0.52) * 0.03;

    // Breathing
    fig.position.y = 0.05 + Math.sin(T * 0.95) * 0.007;

    // Halo + aura pulse
    haloM.opacity = 0.22 + Math.sin(T * 1.8) * 0.09;
    auraM.opacity = 0.12 + Math.sin(T * 1.3) * 0.05;
    aura.scale.setScalar(1 + Math.sin(T * 1.3) * 0.04);
    gold.intensity  = 0.7 + Math.sin(T * 1.6) * 0.20;

    mindarThree.renderer.render(scene, camera);
  });

  await mindarThree.start();
}
</script>
</body>
</html>
