<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Divine Comedy AR</title>

  <!-- MindAR + Three.js (loaded from CDN, no install needed) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family: Georgia, serif; }

    #container { width:100vw; height:100vh; position:relative; }

    /* HUD overlay */
    #hud {
      position:fixed; inset:0; pointer-events:none; z-index:10;
    }

    /* Corners */
    .corner {
      position:absolute; width:36px; height:36px;
      border-color: rgba(212,160,23,0.7); border-style:solid;
    }
    .tl { top:18px; left:18px; border-width:2px 0 0 2px; }
    .tr { top:18px; right:18px; border-width:2px 2px 0 0; }
    .bl { bottom:18px; left:18px; border-width:0 0 2px 2px; }
    .br { bottom:18px; right:18px; border-width:0 2px 2px 0; }

    /* Title */
    #title-hud {
      position:absolute; top:22px; left:50%; transform:translateX(-50%);
      font-size:0.65rem; letter-spacing:0.35em; color:rgba(212,160,23,0.8);
      text-transform:uppercase; white-space:nowrap;
    }

    /* Scanning status */
    #status {
      position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
      font-size:0.6rem; letter-spacing:0.25em; color:rgba(212,160,23,0.7);
      text-transform:uppercase; white-space:nowrap;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* Found indicator */
    #found-badge {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(212,160,23,0.5);
      padding:0.4rem 1.2rem;
      font-size:0.6rem; letter-spacing:0.3em; color:rgba(212,160,23,0.9);
      text-transform:uppercase; white-space:nowrap;
      opacity:0; transition:opacity 0.5s;
      pointer-events:none;
    }
    #found-badge.show { opacity:1; }

    /* Instruction panel (shown before marker is found) */
    #instructions {
      position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
      text-align:center;
      transition:opacity 0.5s;
    }
    #instructions.hidden { opacity:0; pointer-events:none; }
    #instructions p {
      font-size:0.65rem; letter-spacing:0.15em;
      color:rgba(255,240,200,0.5);
      white-space:nowrap;
    }

    /* Info card that appears when figure is found */
    #info-card {
      position:absolute; bottom:60px; left:16px; right:16px;
      background:rgba(10,7,2,0.75);
      border:1px solid rgba(212,160,23,0.3);
      padding:0.9rem 1.1rem;
      backdrop-filter:blur(6px);
      opacity:0; transition:opacity 0.6s;
      pointer-events:none;
    }
    #info-card.show { opacity:1; }
    #info-card h3 {
      font-size:0.75rem; letter-spacing:0.25em;
      color:rgba(212,160,23,0.9); text-transform:uppercase;
      margin-bottom:0.4rem;
    }
    #info-card p {
      font-size:0.7rem; color:rgba(240,220,180,0.65);
      line-height:1.7; font-style:italic;
    }
  </style>
</head>
<body>

<div id="container"></div>

<!-- HUD -->
<div id="hud">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="title-hud">Divine Comedy AR · Cabinet of Wonders</div>
  <div id="status">⬡ Scanning for marker ⬡</div>
  <div id="found-badge">◈ Presence detected ◈</div>
  <div id="instructions">
    <p>Point camera at the printed marker</p>
  </div>
  <div id="info-card">
    <h3>The Wanderer — Cabinet I</h3>
    <p>"In the middle of the journey of our life,<br>
    I came to myself in a dark wood<br>
    where the straight way was lost."</p>
  </div>
</div>

<script>
(async () => {

  // ── 1. MindAR setup ──────────────────────────────────────────────
  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.getElementById('container'),
    imageTargetSrc: './targets.mind',   // compiled from marker.png
    uiLoading: 'yes',
    uiError: 'yes',
    uiScanning: 'yes',
  });

  const { renderer, scene, camera } = mindarThree;

  // ── 2. Three.js: build animated stick figure ──────────────────────
  const THREE = window.THREE;

  // Materials
  const skinMat  = new THREE.MeshPhongMaterial({ color: 0xc09070 });
  const clothMat = new THREE.MeshPhongMaterial({ color: 0x507080 });
  const darkMat  = new THREE.MeshPhongMaterial({ color: 0x2a1a0a });
  const goldMat  = new THREE.MeshPhongMaterial({ color: 0xd4a017, emissive: 0x604000 });

  function capsule(rx, ry, mat) {
    // Approximate capsule with cylinder + 2 spheres
    const g = new THREE.Group();
    const cyl = new THREE.Mesh(new THREE.CylinderGeometry(rx, rx, ry, 8), mat);
    const top = new THREE.Mesh(new THREE.SphereGeometry(rx, 8, 6), mat);
    const bot = new THREE.Mesh(new THREE.SphereGeometry(rx, 8, 6), mat);
    top.position.y =  ry/2;
    bot.position.y = -ry/2;
    g.add(cyl, top, bot);
    return g;
  }
  function sphere(r, mat) {
    return new THREE.Mesh(new THREE.SphereGeometry(r, 10, 8), mat);
  }

  // Figure group — anchored to the marker
  const anchor = mindarThree.addAnchor(0);
  const figure = new THREE.Group();
  figure.scale.setScalar(0.6);
  figure.position.set(0, 0, 0.01);

  // Body parts
  const torso     = capsule(0.07, 0.28, clothMat);
  const hips      = capsule(0.065, 0.12, clothMat);
  const head      = sphere(0.10, skinMat);
  const neck      = capsule(0.035, 0.06, skinMat);

  // Left arm (upper + lower)
  const lArmUp    = capsule(0.04, 0.16, clothMat);
  const lArmLo    = capsule(0.035, 0.14, clothMat);
  const lHand     = sphere(0.04, skinMat);

  // Right arm
  const rArmUp    = capsule(0.04, 0.16, clothMat);
  const rArmLo    = capsule(0.035, 0.14, clothMat);
  const rHand     = sphere(0.04, skinMat);

  // Left leg (upper + lower)
  const lLegUp    = capsule(0.055, 0.20, clothMat);
  const lLegLo    = capsule(0.045, 0.18, clothMat);
  const lFoot     = capsule(0.04, 0.10, darkMat);

  // Right leg
  const rLegUp    = capsule(0.055, 0.20, clothMat);
  const rLegLo    = capsule(0.045, 0.18, clothMat);
  const rFoot     = capsule(0.04, 0.10, darkMat);

  // Hair
  const hair      = sphere(0.104, darkMat);
  hair.position.y = 0.04;

  // Gold aura disc (flat ring at feet)
  const auraGeo   = new THREE.RingGeometry(0.18, 0.32, 32);
  const auraMat   = new THREE.MeshBasicMaterial({ color:0xd4a017, side:THREE.DoubleSide, transparent:true, opacity:0.18 });
  const aura      = new THREE.Mesh(auraGeo, auraMat);
  aura.rotation.x = -Math.PI/2;
  aura.position.y = -0.60;

  // Assemble skeleton hierarchy
  // Hip group (controls whole lower body)
  const hipGroup  = new THREE.Group();
  hipGroup.position.y = -0.15;

  // Left leg group
  const lLegGroup = new THREE.Group();
  lLegGroup.position.set(-0.075, -0.06, 0);
  lLegUp.position.y = -0.10;
  const lLegLoGroup = new THREE.Group();
  lLegLoGroup.position.y = -0.20;
  lLegLo.position.y = -0.09;
  lFoot.position.set(0.02, -0.19, 0.04);
  lFoot.rotation.z = 0.3;
  lLegLoGroup.add(lLegLo, lFoot);
  lLegGroup.add(lLegUp, lLegLoGroup);

  // Right leg group
  const rLegGroup = new THREE.Group();
  rLegGroup.position.set(0.075, -0.06, 0);
  rLegUp.position.y = -0.10;
  const rLegLoGroup = new THREE.Group();
  rLegLoGroup.position.y = -0.20;
  rLegLo.position.y = -0.09;
  rFoot.position.set(-0.02, -0.19, 0.04);
  rFoot.rotation.z = -0.3;
  rLegLoGroup.add(rLegLo, rFoot);
  rLegGroup.add(rLegUp, rLegLoGroup);

  hipGroup.add(hips, lLegGroup, rLegGroup);

  // Torso group
  torso.position.y = 0.14;

  // Left arm group
  const lArmGroup = new THREE.Group();
  lArmGroup.position.set(-0.11, 0.25, 0);
  lArmUp.position.y = -0.08;
  const lArmLoGroup = new THREE.Group();
  lArmLoGroup.position.y = -0.17;
  lArmLo.position.y = -0.07;
  lHand.position.y = -0.15;
  lArmLoGroup.add(lArmLo, lHand);
  lArmGroup.add(lArmUp, lArmLoGroup);

  // Right arm group
  const rArmGroup = new THREE.Group();
  rArmGroup.position.set(0.11, 0.25, 0);
  rArmUp.position.y = -0.08;
  const rArmLoGroup = new THREE.Group();
  rArmLoGroup.position.y = -0.17;
  rArmLo.position.y = -0.07;
  rHand.position.y = -0.15;
  rArmLoGroup.add(rArmLo, rHand);
  rArmGroup.add(rArmUp, rArmLoGroup);

  // Neck + head
  neck.position.y = 0.30;
  head.position.y = 0.40;

  // Assemble figure
  figure.add(aura, hipGroup, torso, lArmGroup, rArmGroup, neck, head, hair);

  // Lighting
  const ambient  = new THREE.AmbientLight(0xfff5e0, 0.8);
  const dirLight = new THREE.DirectionalLight(0xffd090, 1.2);
  dirLight.position.set(1, 3, 2);
  const goldLight = new THREE.PointLight(0xd4a017, 0.6, 2);
  goldLight.position.set(0, 0.3, 0.5);

  anchor.group.add(figure, ambient, dirLight, goldLight);

  // ── 3. Animation loop ────────────────────────────────────────────
  let t = 0;
  const clock = new THREE.Clock();

  // Track visibility for UI
  let isVisible = false;
  anchor.onTargetFound = () => {
    isVisible = true;
    document.getElementById('status').textContent = '◈ Cabinet revealed ◈';
    document.getElementById('found-badge').classList.add('show');
    document.getElementById('instructions').classList.add('hidden');
    document.getElementById('info-card').classList.add('show');
    setTimeout(()=> document.getElementById('found-badge').classList.remove('show'), 2500);
  };
  anchor.onTargetLost = () => {
    isVisible = false;
    document.getElementById('status').textContent = '⬡ Scanning for marker ⬡';
    document.getElementById('instructions').classList.remove('hidden');
    document.getElementById('info-card').classList.remove('show');
  };

  renderer.setAnimationLoop(() => {
    t += clock.getDelta();
    const T = t;

    // Walking cycle
    const walkSpeed = 2.2;

    // Legs swing opposite
    lLegGroup.rotation.x =  Math.sin(T * walkSpeed) * 0.45;
    rLegGroup.rotation.x = -Math.sin(T * walkSpeed) * 0.45;

    // Knee bend (lower leg)
    lLegLoGroup.rotation.x = Math.max(0, -Math.sin(T * walkSpeed) * 0.5);
    rLegLoGroup.rotation.x = Math.max(0, Math.sin(T * walkSpeed) * 0.5);

    // Arms swing opposite to legs
    lArmGroup.rotation.x = -Math.sin(T * walkSpeed) * 0.4;
    rArmGroup.rotation.x =  Math.sin(T * walkSpeed) * 0.4;

    // Slight elbow bend
    lArmLoGroup.rotation.x = 0.15 + Math.max(0, Math.sin(T * walkSpeed) * 0.2);
    rArmLoGroup.rotation.x = 0.15 + Math.max(0, -Math.sin(T * walkSpeed) * 0.2);

    // Torso sway
    torso.rotation.z  = Math.sin(T * walkSpeed) * 0.04;
    torso.rotation.y  = Math.sin(T * walkSpeed) * 0.06;

    // Head slight nod
    head.rotation.x   = Math.sin(T * 1.1) * 0.04;
    hair.position.y   = head.position.y + 0.04;
    neck.rotation.x   = head.rotation.x * 0.5;

    // Hip bob
    hipGroup.position.y = -0.15 + Math.abs(Math.sin(T * walkSpeed)) * 0.015;

    // Body vertical bob
    figure.position.y = 0.01 + Math.abs(Math.sin(T * walkSpeed)) * 0.015;

    // Aura pulse
    auraMat.opacity = 0.12 + Math.sin(T * 1.5) * 0.06;
    aura.scale.setScalar(1 + Math.sin(T * 1.5) * 0.05);

    mindarThree.renderer.render(scene, camera);
  });

  // ── 4. Start ─────────────────────────────────────────────────────
  await mindarThree.start();

})();
</script>
</body>
</html>
